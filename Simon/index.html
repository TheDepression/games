<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Simon Game</title>

<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

h1 { margin-top:20px; }

.grid {
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:40px;
}

.btn {
  width:120px;
  height:120px;
  border-radius:12px;
  opacity:0.6;
  cursor:pointer;
}

#red { background:red; }
#yellow { background:gold; }
#blue { background:blue; }

.active {
  opacity:1;
  box-shadow:0 0 25px white;
}

</style>
</head>

<body>

<h1>Simon Game</h1>
<p id="info">Click to start</p>

<div class="grid">
  <div id="red" class="btn" onclick="press('red')"></div>
  <div id="yellow" class="btn" onclick="press('yellow')"></div>
  <div id="blue" class="btn" onclick="press('blue')"></div>
</div>

<script>

const colors = ["red","yellow","blue"];
let seq = [];
let player = [];
let level = 0;
let playing = false;
let timer;

const sounds = {
  red: new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"),
  yellow: new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg"),
  blue: new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"),
  fail: new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg")
};

document.body.onclick = () => {
  if (!playing) start();
};

function start(){
  seq = [];
  level = 0;
  playing = true;
  next();
}

function next(){
  player = [];
  level++;
  document.getElementById("info").innerText = "Level " + level;

  seq.push(colors[Math.floor(Math.random()*3)]);
  show();
}

function show(){
  let i = 0;
  playing = false;

  let interval = setInterval(() => {
    flash(seq[i]);
    i++;
    if(i >= seq.length){
      clearInterval(interval);
      playing = true;
      startTimer();
    }
  }, 600);
}

function flash(color){
  let el = document.getElementById(color);
  el.classList.add("active");
  sounds[color].play();
  setTimeout(()=> el.classList.remove("active"), 300);
}

function press(color){
  if(!playing) return;

  flash(color);
  player.push(color);

  if(player[player.length-1] !== seq[player.length-1]){
    lose();
    return;
  }

  if(player.length === seq.length){
    clearTimeout(timer);
    setTimeout(next, 800);
  }
}

function startTimer(){
  clearTimeout(timer);
  timer = setTimeout(() => {
    lose();
  }, 5000);
}

function lose(){
  sounds.fail.play();
  document.getElementById("info").innerText = "Game Over (Level " + level + ")";
  playing = false;
}

</script>

</body>
</html>
